name: IPTV Checker Workflow

on:
  schedule:
    # 每天 00:00 UTC (北京时间 08:00) 运行
    - cron: '0 */6 * * *'  
  workflow_dispatch: # 支持手动点击运行
env:
  TZ: Asia/Shanghai
jobs:
  check-iptv:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24' # 建议使用最新的 LTS 版本

      - name: Install FFmpeg
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg

      - name: Install iptv-checker
        run: npm install -g iptv-checker

      - name: Run IPTV Checker
        run: |
          # 确保输入文件 best_sorted.m3u 存在于你的仓库根目录
          iptv-checker -o iptv-output -p 10 -k best_sorted.m3u

      - name: Sort online.m3u by group-title
        shell: python
        run: |
          import re
          import os

          def natural_sort_key(s):
              """
              将字符串拆分为文本和数字，以便进行自然排序。
              例如: "CCTV-10" -> ["cctv-", 10]
              """
              # re.split 会根据数字进行切分，并将数字捕获到列表中
              # map(int, ...) 会尝试将能转为数字的部分转为整型
              return [int(text) if text.isdigit() else text.lower()
                      for text in re.split(r'(\d+)', s)]

          file_path = 'iptv-output/online.m3u'
          if not os.path.exists(file_path):
              print("File not found, skipping sort.")
              exit(0)

          with open(file_path, 'r', encoding='utf-8') as f:
              lines = f.readlines()

          header = lines[0] if lines[0].startswith('#EXTM3U') else ''
          content = lines[1:] if header else lines
          
          # 将 #EXTINF 和 URL 成对组合
          entries = []
          for i in range(0, len(content), 2):
              if i + 1 < len(content):
                  inf_line = content[i]
                  url_line = content[i+1]
                  # 1. 提取 group-title 并 trim
                  group_match = re.search(r'group-title="([^"]+)"', inf_line)
                  group_name = group_match.group(1).strip() if group_match else "Unsorted"
                  
                  # 2. 提取 tvName 并 trim
                  # M3U 标准格式通常是 #EXTINF:-1 tvg-id="..." ..., 频道名称
                  # 我们提取最后一个逗号之后的所有内容作为频道名
                  # tv_name_match = re.search(r',\s*(.+)$', inf_line)
                  # tv_name = tv_name_match.group(1).strip() if tv_name_match else "Unknown"

                  # 2. 提取 tvg-name 并 trim
                  tvg_name_match = re.search(r'tvg-name="([^"]+)"', inf_line)
                  # 3. 提取 频道显示名称 (逗号后的内容) 作为备份
                  display_name_match = re.search(r',\s*(.+)$', inf_line)
                  
                  # 优先级：tvg-name > 频道显示名称 > "Unknown"
                  if tvg_name_match:
                      sort_name = tvg_name_match.group(1).strip()
                  elif display_name_match:
                      sort_name = display_name_match.group(1).strip()
                  else:
                      sort_name = "Unknown"

                  # 存储原始行，但排序时使用 natural_sort_key 生成的键
                  entries.append({
                      'group_key': natural_sort_key(group_name),
                      'name_key': natural_sort_key(sort_name),
                      'inf': inf_line,
                      'url': url_line
                  })


          # 按 group_name 排序，如果 group_name 相同则按 tv_name 排序
          entries.sort(key=lambda x: (x['group_key'], x['name_key']))

          # 写回文件
          with open(file_path, 'w', encoding='utf-8') as f:
              if header:
                  f.write(header.strip() + '\n')
              for entry in entries:
                  f.write(entry['inf'])
                  f.write(entry['url'])
                  # f.write(entry['inf'] + '\n')
                  # f.write(entry['url'] + '\n')
          print(f"Sorting completed. Processed {len(entries)} channels by Group and Name.")

      - name: Commit and Push results
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add iptv-output/
          git commit -m "Update checked IPTV list" || echo "No changes to commit"
          git push